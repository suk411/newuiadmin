<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function(){
        var t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.className = t;
        document.documentElement.style.colorScheme = t;
        document.documentElement.classList.add('theme-loading');
        requestAnimationFrame(function(){ requestAnimationFrame(function(){ document.documentElement.classList.remove('theme-loading'); }); });
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light">
    <meta name="description" content="Admin Dashboard - 1xKing Game Management" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;350;400;500;600;700&display=swap" rel="stylesheet">
    <title>Admin - 1xKing</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
